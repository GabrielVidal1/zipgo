<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docs — zipgo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --white: #ffffff;
        --black: #000000;
        --off: #f7f6f3;
        --ink: #0e0e0d;
        --muted: #6b6b65;
        --faint: #e8e7e2;
        --go: #00acd7;
      }
      [data-theme="dark"] {
        --white: #0f0f0e;
        --black: #ffffff;
        --off: #181816;
        --ink: #000000;
        --muted: #888880;
        --faint: #2a2a27;
        --go: #29c4e8;
      }
      @media (prefers-color-scheme: dark) {
        [data-theme="auto"] {
          --white: #0f0f0e;
          --black: #ffffff;
          --off: #181816;
          --ink: #000000;
          --muted: #888880;
          --faint: #2a2a27;
          --go: #29c4e8;
        }
      }

      html {
        scroll-behavior: smooth;
      }
      body {
        background: var(--white);
        color: var(--ink);
        font-family: "DM Sans", sans-serif;
        font-weight: 300;
        line-height: 1.6;
        overflow-x: hidden;
        min-height: 100vh;
      }

      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 200;
        height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 48px;
        background: color-mix(in srgb, var(--white) 88%, transparent);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--faint);
      }
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "DM Mono", monospace;
        font-size: 15px;
        font-weight: 500;
        text-decoration: none;
        color: var(--black);
      }
      .nav-right {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .theme-btn {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        border: 1px solid var(--faint);
        background: var(--off);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--muted);
        transition:
          color 0.2s,
          background 0.2s;
      }
      .theme-btn:hover {
        color: var(--ink);
        background: var(--faint);
      }
      .theme-btn .icon-sun,
      .theme-btn .icon-moon {
        display: none;
      }
      [data-theme="light"] .theme-btn .icon-sun {
        display: block;
      }
      [data-theme="dark"] .theme-btn .icon-moon {
        display: block;
      }
      html:not([data-theme="dark"]) .theme-btn .icon-sun {
        display: block;
      }
      @media (prefers-color-scheme: dark) {
        [data-theme="auto"] .theme-btn .icon-moon {
          display: block;
        }
        [data-theme="auto"] .theme-btn .icon-sun {
          display: none;
        }
      }
      @media (prefers-color-scheme: light) {
        [data-theme="auto"] .theme-btn .icon-sun {
          display: block;
        }
        [data-theme="auto"] .theme-btn .icon-moon {
          display: none;
        }
      }
      @media (max-width: 720px) {
        nav {
          padding: 0 20px;
        }
      }

      .page {
        padding: 118px 68px 80px;
        max-width: 1080px;
        margin: 0 auto;
      }
      @media (max-width: 900px) {
        .page {
          padding: 88px 28px 60px;
        }
      }

      .page-eyebrow {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        font-weight: 400;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--go);
        margin-bottom: 14px;
        opacity: 0;
        animation: fadeUp 0.5s 0.05s forwards;
      }
      .page-title {
        font-family: "DM Serif Display", serif;
        font-size: clamp(28px, 3.8vw, 52px);
        line-height: 1.08;
        letter-spacing: -0.02em;
        color: var(--black);
        margin-bottom: 10px;
        opacity: 0;
        animation: fadeUp 0.6s 0.12s forwards;
      }
      .page-title em {
        font-style: italic;
        color: var(--muted);
      }
      .page-sub {
        font-size: 15px;
        color: var(--muted);
        margin-bottom: 44px;
        opacity: 0;
        animation: fadeUp 0.6s 0.2s forwards;
      }
      .count-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        background: var(--off);
        padding: 4px 11px;
        border-radius: 99px;
        border: 1px solid var(--faint);
      }

      .divider {
        height: 1px;
        background: var(--faint);
        margin-bottom: 44px;
        opacity: 0;
        animation: fadeIn 0.6s 0.28s forwards;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1px;
        background: var(--faint);
        border: 1px solid var(--faint);
        border-radius: 12px;
        overflow: hidden;
        opacity: 0;
        animation: fadeUp 0.7s 0.32s forwards;
      }

      .card {
        background: var(--white);
        padding: 28px 28px 24px;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        gap: 14px;
        transition: background 0.18s;
        position: relative;
      }
      .card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: hsl(var(--hue), 65%, 52%);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.22s cubic-bezier(0.34, 1.2, 0.64, 1);
      }
      .card:hover {
        background: var(--off);
      }
      .card:hover::after {
        transform: scaleX(1);
      }

      .card-top {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .avatar {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Serif Display", serif;
        font-size: 17px;
        font-weight: 400;
        flex-shrink: 0;
        color: #fff;
        background: hsl(var(--hue), 55%, 42%);
      }
      .card-name {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: var(--black);
      }
      .card-host {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 200px;
      }

      .card-desc {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.7;
        flex: 1;
      }

      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 4px;
        border-top: 1px solid var(--faint);
      }

      .badge {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 3px 9px;
        border-radius: 99px;
        border: 1px solid var(--faint);
        color: var(--muted);
        background: var(--off);
      }
      .badge-spa {
        border-color: rgba(0, 172, 215, 0.35);
        color: var(--go);
        background: color-mix(in srgb, var(--go) 8%, var(--white));
      }
      .badge-static {
        border-color: rgba(0, 172, 215, 0.1);
      }

      .card-arrow {
        color: var(--muted);
        transition:
          color 0.18s,
          transform 0.18s;
        display: flex;
      }
      .card:hover .card-arrow {
        color: var(--ink);
        transform: translate(2px, -2px);
      }

      .empty {
        background: var(--white);
        padding: 72px 28px;
        text-align: center;
        grid-column: 1 / -1;
      }
      .empty-icon {
        width: 48px;
        height: 48px;
        border: 1px solid var(--faint);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        color: var(--muted);
      }
      .empty p {
        font-family: "DM Serif Display", serif;
        font-size: 22px;
        color: var(--black);
        margin-bottom: 8px;
      }
      .empty span {
        font-size: 13px;
        color: var(--muted);
      }

      footer {
        border-top: 1px solid var(--faint);
        padding: 28px 68px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 56px;
      }
      .footer-logo {
        font-family: "DM Mono", monospace;
        font-size: 14px;
        color: var(--black);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .footer-mid {
        font-size: 13px;
        color: var(--muted);
      }
      .footer-links {
        display: flex;
        gap: 18px;
      }
      .footer-links a {
        font-family: "DM Mono", monospace;
        font-size: 12px;
        color: var(--muted);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .footer-links a:hover {
        color: var(--ink);
      }
      @media (max-width: 720px) {
        footer {
          padding: 24px 28px;
          flex-direction: column;
          align-items: flex-start;
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a class="nav-logo" href="https://zipgo.xyz">🌐 zipgo</a>
      <div class="nav-right">
        <button
          class="theme-btn"
          id="theme-toggle"
          aria-label="Toggle dark mode"
        >
          <i
            data-lucide="sun"
            class="icon-sun"
            style="width: 15px; height: 15px"
          ></i>
          <i
            data-lucide="moon"
            class="icon-moon"
            style="width: 15px; height: 15px"
          ></i>
        </button>
      </div>
    </nav>

    <main class="page">
      <h1 class="page-title">Docs,<br /><em> Soon</em></h1>
    </main>

    <footer>
      <div class="footer-logo">🌐 zipgo</div>
      <div class="footer-mid" style="font-size: 13px; color: var(--muted)">
        powered by zipgo + Caddy
      </div>
      <div class="footer-links">
        <a
          href="https://github.com/GabrielVidal1/zipgo"
          target="_blank"
          rel="noopener"
        >
          <i data-lucide="github" style="width: 13px; height: 13px"></i> GitHub
        </a>
        <a href="https://caddyserver.com" target="_blank" rel="noopener">
          <i data-lucide="shield-check" style="width: 13px; height: 13px"></i>
          Caddy
        </a>
      </div>
    </footer>

    <script>
      lucide.createIcons();

      const html = document.documentElement;
      document.getElementById("theme-toggle").addEventListener("click", () => {
        const effective =
          html.getAttribute("data-theme") === "dark"
            ? "dark"
            : html.getAttribute("data-theme") === "light"
              ? "light"
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
        const next = effective === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", next);
        localStorage.setItem("sh-theme", next);
        lucide.createIcons();
      });
      const saved = localStorage.getItem("sh-theme");
      if (saved) html.setAttribute("data-theme", saved);
    </script>
  </body>
</html>
