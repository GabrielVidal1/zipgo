<svg width="680" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg"
  style="background:#0f172a;border-radius:12px;font-family:system-ui,-apple-system,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6"
      orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <!-- Internet / Client -->
  <rect x="270" y="20" width="140" height="44" rx="8" fill="#1e293b" stroke="#475569"
    stroke-width="0.5" />
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="13"
    font-weight="500" fill="#e2e8f0">Internet / browser</text>

  <!-- Arrow down to Caddy -->
  <line x1="340" y1="64" x2="340" y2="108" stroke="#64748b" stroke-width="1"
    marker-end="url(#arrow)" />
  <text x="352" y="90" dominant-baseline="central" font-size="11" fill="#64748b">:80 / :443</text>

  <!-- Caddy outer container -->
  <rect x="60" y="108" width="560" height="200" rx="14" fill="#26215c" stroke="#534ab7"
    stroke-width="0.5" />
  <text x="340" y="134" text-anchor="middle" dominant-baseline="central" font-size="13"
    font-weight="500" fill="#cecbf6">Caddy (reverse proxy + TLS)</text>

  <!-- TLS badge -->
  <rect x="80" y="148" width="130" height="36" rx="6" fill="#085041" stroke="#0f6e56"
    stroke-width="0.5" />
  <text x="145" y="166" text-anchor="middle" dominant-baseline="central" font-size="12"
    font-weight="500" fill="#9fe1cb">Let's Encrypt TLS</text>

  <!-- HTTP redirect badge -->
  <rect x="226" y="148" width="120" height="36" rx="6" fill="#1e293b" stroke="#334155"
    stroke-width="0.5" />
  <text x="286" y="166" text-anchor="middle" dominant-baseline="central" font-size="12"
    font-weight="500" fill="#94a3b8">HTTP → HTTPS</text>

  <text x="460" y="163" text-anchor="middle" dominant-baseline="central" font-size="11"
    fill="#7c76ce">Route by hostname</text>

  <!-- Root site -->
  <rect x="80" y="204" width="140" height="44" rx="8" fill="#0c447c" stroke="#185fa5"
    stroke-width="0.5" />
  <text x="150" y="222" text-anchor="middle" dominant-baseline="central" font-size="13"
    font-weight="500" fill="#b5d4f4">root site</text>
  <text x="150" y="238" text-anchor="middle" dominant-baseline="central" font-size="11"
    fill="#85b7eb">yourdomain.com</text>

  <!-- Sub-sites -->
  <rect x="250" y="204" width="160" height="44" rx="8" fill="#0c447c" stroke="#185fa5"
    stroke-width="0.5" />
  <text x="330" y="222" text-anchor="middle" dominant-baseline="central" font-size="13"
    font-weight="500" fill="#b5d4f4">sub-sites</text>
  <text x="330" y="238" text-anchor="middle" dominant-baseline="central" font-size="11"
    fill="#85b7eb">*.yourdomain.com</text>

  <!-- Backoffice proxy -->
  <rect x="440" y="204" width="160" height="44" rx="8" fill="#711313" stroke="#993c1d"
    stroke-width="0.5" />
  <text x="520" y="222" text-anchor="middle" dominant-baseline="central" font-size="13"
    font-weight="500" fill="#f5c4b3">backoffice proxy</text>
  <text x="520" y="238" text-anchor="middle" dominant-baseline="central" font-size="10"
    fill="#f0997b">backoffice.yourdomain.com</text>

  <!-- Arrows down -->
  <line x1="150" y1="308" x2="150" y2="352" stroke="#64748b" stroke-width="1"
    marker-end="url(#arrow)" />
  <line x1="330" y1="308" x2="330" y2="352" stroke="#64748b" stroke-width="1"
    marker-end="url(#arrow)" />
  <line x1="520" y1="308" x2="520" y2="352" stroke="#64748b" stroke-width="1"
    marker-end="url(#arrow)" />

  <!-- File server root -->
  <rect x="110" y="352" width="100" height="56" rx="8" fill="#173404" stroke="#3b6d11"
    stroke-width="0.5" />
  <text x="160" y="374" text-anchor="middle" dominant-baseline="central" font-size="13"
    font-weight="500" fill="#c0dd97">File server</text>
  <text x="160" y="392" text-anchor="middle" dominant-baseline="central" font-size="11"
    fill="#97c459">apps/root/</text>

  <!-- File servers -->
  <rect x="240" y="352" width="200" height="56" rx="8" fill="#173404" stroke="#3b6d11"
    stroke-width="0.5" />
  <text x="340" y="374" text-anchor="middle" dominant-baseline="central" font-size="13"
    font-weight="500" fill="#c0dd97">File servers</text>
  <text x="340" y="392" text-anchor="middle" dominant-baseline="central" font-size="11"
    fill="#97c459">apps/blog/, apps/docs/, …</text>

  <!-- Backoffice server -->
  <rect x="470" y="352" width="100" height="56" rx="8" fill="#633806" stroke="#854f0b"
    stroke-width="0.5" />
  <text x="520" y="374" text-anchor="middle" dominant-baseline="central" font-size="13"
    font-weight="500" fill="#fac775">Backoffice UI</text>
  <text x="520" y="392" text-anchor="middle" dominant-baseline="central" font-size="11"
    fill="#ef9f27">127.0.0.1:9876</text>

  <!-- Apps dir on disk -->
  <rect x="60" y="452" width="200" height="36" rx="8" fill="#1e293b" stroke="#334155"
    stroke-width="0.5" />
  <text x="160" y="470" text-anchor="middle" dominant-baseline="central" font-size="13"
    font-weight="500" fill="#94a3b8">apps/ on disk</text>

  <line x1="160" y1="408" x2="160" y2="452" stroke="#64748b" stroke-width="1"
    marker-end="url(#arrow)" />

  <!-- Reload dashed loop -->
  <path d="M520 408 L520 460 L340 460 L340 408" fill="none" stroke="#475569" stroke-width="0.5"
    stroke-dasharray="4 3" marker-end="url(#arrow)" />
  <text x="430" y="478" text-anchor="middle" font-size="11" fill="#64748b">deploy / delete → reload
    Caddy config</text>
</svg>